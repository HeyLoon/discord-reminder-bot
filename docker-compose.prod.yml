services:
  discord-bot:
    # 使用 GitHub Container Registry 上的映像
    image: ghcr.io/heyloon/discord-reminder-bot:latest
    container_name: discord-reminder-bot
    restart: unless-stopped
    
    # 環境變數（從 .env 檔案讀取）
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - GUILD_ID=${GUILD_ID}
      - TZ=${TZ:-Asia/Taipei}
      - DATA_DIR=/app/data
      - NODE_ENV=production
    
    # Volume 掛載（持久化資料）
    volumes:
      - bot-data:/app/data
    
    # 資源限制（可選，根據您的伺服器調整）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # 健康檢查
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node bot.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 日誌配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volume 定義
volumes:
  bot-data:
    driver: local
